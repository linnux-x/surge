name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    if: github.repository == 'linnux-x/surge'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Rule Syntax & Project Policies
        run: python3 scripts/validate_surge_repo.py --ci
