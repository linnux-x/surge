# linnux-x Surge upstream sync workflow
# Adapted from Rabbit-Spec/Surge .github/workflows/auto-rules.yml

name: Auto-Surge-Rules

on:
  schedule:
    # 06:00 JST (21:00 UTC) every day
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build rules without committing changes"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: auto-surge-rules
  cancel-in-progress: false

jobs:
  update-rules:
    if: github.repository == 'linnux-x/surge'
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RULE_DIR: Rule
      MANUAL_DIR: Rule/Manual
      REPO_URL: https://github.com/linnux-x/surge
      AUTHOR_NAME: linnux-x

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Upstream Updates
        id: check_upstream
        shell: bash
        run: |
          set -euo pipefail
          # Run check — exits 1 if changes found; both paths capture output
          output=$(python3 scripts/check_upstream_updates.py 2>&1) || true
          echo "$output"
          # Parse the last JSON line as the summary
          summary=$(echo "$output" | grep '^{' | tail -1)
          changed=$(echo "$summary" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d['rulesets']))" 2>/dev/null || echo "[]")
          echo "changed_rulesets=$changed" >> "$GITHUB_OUTPUT"
          count=$(echo "$summary" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d['rulesets']))" 2>/dev/null || echo "0")
          echo "changed_count=$count" >> "$GITHUB_OUTPUT"

      - name: Download, Merge and Filter Rules
        id: generate
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail

          # Parse the list of changed rulesets
          CHANGED=()
          IFS=' ' read -ra CHANGED < <(echo '${{ steps.check_upstream.outputs.changed_rulesets }}' | python3 -c "import json,sys; [print(r) for r in json.load(sys.stdin)]") || true

          should_process() {
            local target="$1"
            for c in "${CHANGED[@]}"; do
              [ "$c" = "$target" ] && return 0
            done
            return 1
          }

          mkdir -p "$MANUAL_DIR"
          UPDATE_TIME=$(TZ="Asia/Shanghai" date +"%Y-%m-%d %H:%M:%S +0800")

          # ── Helper functions (unchanged from original) ──────────────────

          SUKKA_MARKER_RE='7h1s_rul35et_i5_mad3_by_5ukk4w-ruleset[.]skk[.]moe'

          clean_source() {
            awk -v marker="$SUKKA_MARKER_RE" '
              {
                sub(/\r$/, "")
                sub(/[[:space:]]+$/, "")
                sub(/[[:space:]]+#.*$/, "")
              }
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*$/ { next }
              tolower($0) ~ marker { next }
              { print }
            '
          }

          convert_domainset() {
            awk -v marker="$SUKKA_MARKER_RE" '
              {
                sub(/\r$/, "")
                sub(/[[:space:]]+$/, "")
                sub(/[[:space:]]+#.*$/, "")
              }
              /^[[:space:]]*$/ { next }
              tolower($0) ~ marker { next }
              /^\./ {
                sub(/^\./, "")
                print "DOMAIN-SUFFIX," tolower($0)
                next
              }
              /^[A-Za-z0-9_.-]+\.[A-Za-z0-9.-]+$/ {
                print "DOMAIN," tolower($0)
                next
              }
              { print }
            '
          }

          convert_cidr() {
            awk '
              {
                sub(/\r$/, "")
                sub(/[[:space:]]+$/, "")
                sub(/[[:space:]]+#.*$/, "")
              }
              /^[[:space:]]*$/ { next }
              /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\/[0-9]+$/ {
                print "IP-CIDR," $0
                next
              }
              /^[0-9A-Fa-f:]+\/[0-9]+$/ {
                print "IP-CIDR6," tolower($0)
                next
              }
              { print }
            '
          }

          filter_candidates() {
            local exclude_file=$1
            if [ -f "$exclude_file" ] && [ -s "$exclude_file" ]; then
              grep -vFf <(sed 's/\r$//' "$exclude_file" | awk 'NF && $0 !~ /^[[:space:]]*#/') || true
            else
              cat
            fi
          }

          append_manual_rules() {
            local target_name=$1
            local temp_body=$2
            local filename_no_ext="${target_name%.*}"
            local manual_file="$MANUAL_DIR/${filename_no_ext}.txt"

            if [ -f "$manual_file" ]; then
              echo "# ======= Manual Rules ========" >> "$temp_body"
              sed 's/\r$//' "$manual_file" >> "$temp_body"
              echo "" >> "$temp_body"
            fi
          }

          append_upstream_source() {
            local spec=$1
            local temp_body=$2
            local exclude_file=$3
            local source_name="${spec%%|*}"
            local source_rest="${spec#*|}"
            local source_url="${source_rest%%|*}"
            local source_format=""

            if [ "$source_rest" != "$source_url" ]; then
              source_format="${source_rest#*|}"
            fi

            echo "# ======= ${source_name} ========" >> "$temp_body"
            if [ "$source_format" = "domainset" ]; then
              curl -fsSL "$source_url" | clean_source | convert_domainset | filter_candidates "$exclude_file" >> "$temp_body"
            elif [ "$source_format" = "cidr" ]; then
              curl -fsSL "$source_url" | clean_source | convert_cidr | filter_candidates "$exclude_file" >> "$temp_body"
            else
              curl -fsSL "$source_url" | clean_source | filter_candidates "$exclude_file" >> "$temp_body"
            fi
            echo "" >> "$temp_body"
          }

          apply_project_guardrails() {
            local target_name=$1
            local file=$2
            local tmp="${file}.guard"

            cp "$file" "$tmp"

            case "$target_name" in
              Microsoft.list)
                grep -viE 'github|ghcr\.io' "$tmp" > "${tmp}.next" || true
                mv "${tmp}.next" "$tmp"
                ;;
              Netflix.list|GlobalMedia.list|Global.list)
                grep -viE '(^|,)([^,]*\.)?fast\.com(,|$)' "$tmp" > "${tmp}.next" || true
                mv "${tmp}.next" "$tmp"
                ;;
              Google.list)
                grep -viE 'youtube|ytimg\.com|googlevideo\.com|youtubei\.googleapis\.com' "$tmp" > "${tmp}.next" || true
                mv "${tmp}.next" "$tmp"
                ;;
              China.list)
                grep -viE '^(IP-CIDR|IP-CIDR6|IP-ASN),' "$tmp" > "${tmp}.next" || true
                mv "${tmp}.next" "$tmp"
                ;;
              China_IP.list)
                sed -E 's/,(no-resolve|NO-RESOLVE)//g' "$tmp" > "${tmp}.next"
                mv "${tmp}.next" "$tmp"
                ;;
            esac

            grep -viE '^DOMAIN-KEYWORD,[0-9]+(\.[0-9]+){1,3}\.?$' "$tmp" > "${tmp}.next" || true
            mv "${tmp}.next" "$tmp"

            if [ "$target_name" != "China_IP.list" ]; then
              awk '
                BEGIN { IGNORECASE = 1 }
                /^(IP-CIDR|IP-CIDR6|IP-ASN),/ {
                  if (tolower($0) !~ /,no-resolve(,|$)/) {
                    print $0 ",no-resolve"
                    next
                  }
                }
                { print }
              ' "$tmp" > "${tmp}.next"
              mv "${tmp}.next" "$tmp"
            fi

            mv "$tmp" "$file"
          }

          dedupe_preserve_order() {
            local file=$1
            sed -i 's/\r//g' "$file"
            awk '/^#|^[[:space:]]*$/ { print; next } !seen[tolower($0)]++' "$file" > "${file}.tmp"
            mv "${file}.tmp" "$file"
          }

          prune_redundant_cidr() {
            local file=$1
            python3 scripts/prune_cidr.py "$file"
          }

          validate_rules() {
            local file=$1
            local target_name=$2
            local invalid_lines
            local policy_lines

            invalid_lines=$(
              awk '
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                $0 !~ /^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|IP-CIDR|IP-CIDR6|IP-ASN|USER-AGENT|PROCESS-NAME|URL-REGEX|AND|OR|NOT),/ {
                  print
                  if (++n == 20) exit
                }
              ' "$file"
            )

            if [ -n "$invalid_lines" ]; then
              echo "Invalid Surge rule lines in $target_name:"
              echo "$invalid_lines"
              exit 1
            fi

            policy_lines=$(
              awk -F, '
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                $1 ~ /^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|IP-CIDR|IP-CIDR6|IP-ASN|USER-AGENT|PROCESS-NAME)$/ && NF >= 3 {
                  option = tolower($3)
                  if (option != "no-resolve" && option != "extended-matching") {
                    print
                    if (++n == 20) exit
                  }
                }
              ' "$file"
            )

            if [ -n "$policy_lines" ]; then
              echo "Possible policy names found in $target_name:"
              echo "$policy_lines"
              exit 1
            fi

            project_policy_lines=$(
              awk -v target="$target_name" '
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                {
                  low = tolower($0)
                  if (low ~ /^domain-keyword,[0-9]+[.][0-9]+[.][0-9]+[.]?/) {
                    print "Numeric DOMAIN-KEYWORD fragment: " $0
                    if (++n == 20) exit
                  }
                  if (target == "China.list" && low ~ /^(ip-cidr|ip-cidr6|ip-asn),/) {
                    print "IP rule in China.list: " $0
                    if (++n == 20) exit
                  }
                  if (target == "China_IP.list" && low ~ /^(ip-cidr|ip-cidr6|ip-asn),/ && low ~ /,no-resolve(,|$)/) {
                    print "no-resolve in China_IP.list: " $0
                    if (++n == 20) exit
                  }
                  if (target != "China_IP.list" && low ~ /^(ip-cidr|ip-cidr6|ip-asn),/ && low !~ /,no-resolve(,|$)/) {
                    print "Missing no-resolve: " $0
                    if (++n == 20) exit
                  }
                  if (target == "Microsoft.list" && low ~ /(github|ghcr[.]io)/) {
                    print "GitHub family rule in Microsoft.list: " $0
                    if (++n == 20) exit
                  }
                  if (target != "Speedtest.list" && low ~ /(^|,)([^,]*[.])?fast[.]com(,|$)/) {
                    print "fast.com outside Speedtest.list: " $0
                    if (++n == 20) exit
                  }
                  if (target != "CDN.list" && low ~ /^domain-suffix,(akadns[.]net|akamaiedge[.]net|akamaihd[.]net|akamaized[.]net|azureedge[.]net|b-cdn[.]net|cdn77[.]org|cloudfront[.]net|edgekey[.]net|edgesuite[.]net|fastly[.]net)$/) {
                    print "Shared CDN parent outside CDN.list: " $0
                    if (++n == 20) exit
                  }
                  if (target == "China.list" && low ~ /^(domain,rthklive2-lh[.]akamaihd[.]net|domain-suffix,(bilibili[.]tv|biliintl[.]co|biliintl[.]com|himalaya[.]com|iflix[.]com|iq[.]com|joox[.]com|kwai-group[.]com|kwai[.]com|kwai[.]net|kwaicdn[.]com|nba[.]com|snssdk[.]com|tiktokd[.]net|tiktokd[.]org|wetv[.]vip|wetvinfo[.]com)|user-agent,(himalaya[*]|tiktok[*]))$/) {
                    print "Non-China media/social fallback in China.list: " $0
                    if (++n == 20) exit
                  }
                }
              ' "$file"
            )

            if [ -n "$project_policy_lines" ]; then
              echo "Project policy violations found in $target_name:"
              echo "$project_policy_lines"
              exit 1
            fi
          }

          # ── Process a single rule (unchanged) ──────────────────────────

          process_rule() {
            local target_name=$1
            local display_name=$2
            shift 2

            local target_path="$RULE_DIR/$target_name"
            local filename_no_ext="${target_name%.*}"
            local exclude_file="$MANUAL_DIR/${filename_no_ext}.exclude.txt"
            local temp_body
            local rule_count

            temp_body=$(mktemp)

            append_manual_rules "$target_name" "$temp_body"

            for source_spec in "$@"; do
              append_upstream_source "$source_spec" "$temp_body" "$exclude_file"
            done

            apply_project_guardrails "$target_name" "$temp_body"
            dedupe_preserve_order "$temp_body"
            prune_redundant_cidr "$temp_body"
            validate_rules "$temp_body" "$target_name"

            rule_count=$(awk '!/^#/ && !/^[[:space:]]*$/ { n++ } END { print n + 0 }' "$temp_body")

            {
              echo "# NAME: $display_name"
              echo "# AUTHOR: $AUTHOR_NAME"
              echo "# REPO: $REPO_URL"
              echo "# UPDATED: $UPDATE_TIME"
              echo "# FORMAT: Surge Ruleset"
              echo "# TOTAL: $rule_count"
              echo ""
              cat "$temp_body"
            } > "$target_path"

            rm "$temp_body"
          }

          # ── Global overlap prune (unchanged) ───────────────────────────

          prune_global_first_match_overlaps() {
            local target_path="$RULE_DIR/Global.list"
            local overlap_rules
            local temp_rules
            local temp_output
            local rule_count

            overlap_rules=$(mktemp)
            temp_output=$(mktemp)

            for rule_file in \
              WeChat.list Speedtest.list AI.list Apple_CN.list Apple.list \
              Microsoft_CDN.list Microsoft.list Telegram.list Download.list Game.list \
              YouTube.list TikTok.list SocialMedia.list PayPal.list \
              Google.list Netflix.list Disney.list ChinaMedia.list \
              GlobalMedia.list CDN.list; do
              if [ -f "$RULE_DIR/$rule_file" ]; then
                awk '!/^#/ && !/^[[:space:]]*$/ { print tolower($0) }' "$RULE_DIR/$rule_file" >> "$overlap_rules"
              fi
            done

            temp_rules=$(mktemp)
            awk '!seen[$0]++' "$overlap_rules" > "$temp_rules"
            mv "$temp_rules" "$overlap_rules"

            awk -v excludes="$overlap_rules" '
              BEGIN {
                while ((getline line < excludes) > 0) {
                  drop[line] = 1
                }
              }
              /^#/ || /^[[:space:]]*$/ { print; next }
              !(tolower($0) in drop) { print }
            ' "$target_path" > "$temp_output"

            rule_count=$(awk '!/^#/ && !/^[[:space:]]*$/ { n++ } END { print n + 0 }' "$temp_output")
            awk -v total="$rule_count" '{
              if ($0 ~ /^# TOTAL:/) {
                print "# TOTAL: " total
              } else {
                print
              }
            }' "$temp_output" > "$target_path"

            rm "$overlap_rules" "$temp_output"
            validate_rules "$target_path" "Global.list"
          }

          # ── Source URIs ────────────────────────────────────────────────

          BM7="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge"
          SUKKA="https://raw.githubusercontent.com/SukkaW/Surge/master/Source"
          RABBIT="https://raw.githubusercontent.com/Rabbit-Spec/Surge/Master/Rules"
          QUIXOTIC="https://raw.githubusercontent.com/QuixoticHeart/rule-set/refs/heads/ruleset/surge"
          CHUA="https://raw.githubusercontent.com/ConnersHua/RuleGo/master/Surge/Ruleset/Extra"

          # ── Conditional rule generation ────────────────────────────────

          if should_process "AI.list"; then
            process_rule "AI.list" "AI" \
              "SukkaW AI|$SUKKA/non_ip/ai.conf" \
              "SukkaW Apple Intelligence|$SUKKA/non_ip/apple_intelligence.conf" \
              "Rabbit-Spec AIGC|$RABBIT/AIGC.list" \
              "ConnersHua AI|$CHUA/AI.list"
          fi

          if should_process "Apple.list"; then
            process_rule "Apple.list" "Apple" \
              "blackmatrix7 Apple|$BM7/Apple/Apple_All_No_Resolve.list"
          fi

          if should_process "Apple_CN.list"; then
            process_rule "Apple_CN.list" "Apple_CN" \
              "SukkaW Apple CN|https://ruleset.skk.moe/List/non_ip/apple_cn.conf" \
              "SukkaW Apple CDN|https://ruleset.skk.moe/List/domainset/apple_cdn.conf|domainset"
          fi

          if should_process "CDN.list"; then
            process_rule "CDN.list" "CDN" \
              "SukkaW CDN|$SUKKA/non_ip/cdn.conf"
          fi

          if should_process "Download.list"; then
            process_rule "Download.list" "Download" \
              "SukkaW Download|$SUKKA/domainset/download.conf|domainset" \
              "SukkaW Game Download|$SUKKA/domainset/game-download.conf|domainset"
          fi

          if should_process "China.list"; then
            process_rule "China.list" "China" \
              "SukkaW Domestic|$SUKKA/non_ip/domestic.conf" \
              "blackmatrix7 ChinaMaxNoIP Domain|$BM7/ChinaMaxNoIP/ChinaMaxNoIP_Domain.list|domainset" \
              "Rabbit-Spec China|$RABBIT/China.list"
          fi

          if should_process "China_IP.list"; then
            process_rule "China_IP.list" "China_IP" \
              "Loyalsoldier China CIDR|https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/cncidr.txt" \
              "blackmatrix7 China IPs|$BM7/ChinaIPs/ChinaIPs.list" \
              "Rabbit-Spec China CIDR|$RABBIT/ChinaCIDR.list"
          fi

          if should_process "ChinaMedia.list"; then
            process_rule "ChinaMedia.list" "ChinaMedia" \
              "blackmatrix7 ChinaMedia|$BM7/ChinaMedia/ChinaMedia.list"
          fi

          if should_process "Disney.list"; then
            process_rule "Disney.list" "Disney" \
              "blackmatrix7 Disney|$BM7/Disney/Disney.list"
          fi

          if should_process "Game.list"; then
            process_rule "Game.list" "Game" \
              "blackmatrix7 Game|$BM7/Game/Game.list"
          fi

          if should_process "Global.list"; then
            process_rule "Global.list" "Global" \
              "blackmatrix7 Global|$BM7/Global/Global_All_No_Resolve.list"
          fi

          if should_process "GlobalMedia.list"; then
            process_rule "GlobalMedia.list" "GlobalMedia" \
              "blackmatrix7 GlobalMedia|$BM7/GlobalMedia/GlobalMedia_All_No_Resolve.list"
          fi

          if should_process "Google.list"; then
            process_rule "Google.list" "Google" \
              "blackmatrix7 Google|$BM7/Google/Google.list"
          fi

          if should_process "Microsoft.list"; then
            process_rule "Microsoft.list" "Microsoft" \
              "blackmatrix7 Microsoft|$BM7/Microsoft/Microsoft.list"
          fi

          if should_process "Microsoft_CDN.list"; then
            process_rule "Microsoft_CDN.list" "Microsoft_CDN" \
              "SukkaW Microsoft CDN|https://ruleset.skk.moe/List/non_ip/microsoft_cdn.conf"
          fi

          if should_process "Netflix.list"; then
            process_rule "Netflix.list" "Netflix" \
              "blackmatrix7 Netflix|$BM7/Netflix/Netflix.list"
          fi

          if should_process "PayPal.list"; then
            process_rule "PayPal.list" "PayPal" \
              "blackmatrix7 PayPal|$BM7/PayPal/PayPal.list"
          fi

          if should_process "SocialMedia.list"; then
            process_rule "SocialMedia.list" "SocialMedia" \
              "QuixoticHeart SocialMedia|$QUIXOTIC/socialmedia.list" \
              "QuixoticHeart Forum|$QUIXOTIC/forum.list" \
              "blackmatrix7 Facebook|$BM7/Facebook/Facebook.list" \
              "blackmatrix7 Instagram|$BM7/Instagram/Instagram.list" \
              "blackmatrix7 Twitter|$BM7/Twitter/Twitter.list"
          fi

          if should_process "Speedtest.list"; then
            process_rule "Speedtest.list" "Speedtest" \
              "SukkaW Speedtest|$SUKKA/domainset/speedtest.conf|domainset"
          fi

          if should_process "Telegram.list"; then
            process_rule "Telegram.list" "Telegram" \
              "blackmatrix7 Telegram|$BM7/Telegram/Telegram.list" \
              "Telegram Official CIDR|https://core.telegram.org/resources/cidr.txt|cidr" \
              "SukkaW Telegram IP|https://ruleset.skk.moe/List/ip/telegram.conf"
          fi

          if should_process "TikTok.list"; then
            process_rule "TikTok.list" "TikTok" \
              "blackmatrix7 TikTok|$BM7/TikTok/TikTok.list"
          fi

          if should_process "WeChat.list"; then
            process_rule "WeChat.list" "WeChat" \
              "blackmatrix7 WeChat|$BM7/WeChat/WeChat.list"
          fi

          if should_process "YouTube.list"; then
            process_rule "YouTube.list" "YouTube" \
              "blackmatrix7 YouTube|$BM7/YouTube/YouTube.list"
          fi

          # ── Prune Global overlaps if anything changed ──────────────────
          if [ ${#CHANGED[@]} -gt 0 ]; then
            prune_global_first_match_overlaps
          fi

      - name: Generate Rule Manifests
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/manifest.py

      - name: Generate Diff Report
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/diff_manifests.py

      - name: Validate Repository Invariants
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_surge_repo.py

      - name: Online Audit (Upstream & Shared Infrastructure)
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/audit_rules.py

      - name: Sync DNS Mapping Module
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Module
          curl --fail --location --retry 3 --retry-delay 5 \
            --output Module/DNS-Mapping.sgmodule \
            https://ruleset.skk.moe/Modules/sukka_local_dns_mapping.sgmodule
          sed -i '1s|^#!name=.*|#!name=DNS-Mapping|' Module/DNS-Mapping.sgmodule
          sed -i '2s|^#!desc=.*|#!desc=本地 DNS 映射，优化国内常用服务与局域网域名解析|' Module/DNS-Mapping.sgmodule

      - name: Commit and Push Changes
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Rule/ Rule/.manifests/ Module/ scripts/manifest.py scripts/diff_manifests.py scripts/diff_report.md scripts/diff_report.json scripts/check_upstream_updates.py scripts/source_state.json

          if ! git diff --staged --quiet; then
            COMMIT_TIME=$(TZ="Asia/Shanghai" date +"%Y-%m-%d %H:%M:%S +0800")
            git commit -m "$COMMIT_TIME Update rules"
            git push
          fi
