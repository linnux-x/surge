# linnux-x Surge upstream sync workflow
# Adapted from Rabbit-Spec/Surge .github/workflows/auto-rules.yml

name: Auto-Surge-Rules

on:
  schedule:
    # 05:00 Beijing / 06:00 JST (21:00 UTC) every day
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build rules without committing changes"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: auto-surge-rules
  cancel-in-progress: false

jobs:
  update-rules:
    if: github.repository == 'linnux-x/surge'
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RULE_DIR: Rule
      MANUAL_DIR: Rule/Manual
      REPO_URL: https://github.com/linnux-x/surge
      AUTHOR_NAME: linnux-x

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Upstream Updates
        id: check_upstream
        shell: bash
        run: |
          set -euo pipefail
          # Run check — exits 1 if changes found; both paths capture output
          output=$(python3 scripts/check_upstream_updates.py 2>&1) || true
          echo "$output"
          # Parse the last JSON line as the summary
          summary=$(echo "$output" | grep '^{' | tail -1)
          changed=$(echo "$summary" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d['rulesets']))" 2>/dev/null || echo "[]")
          echo "changed_rulesets=$changed" >> "$GITHUB_OUTPUT"
          count=$(echo "$summary" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d['rulesets']))" 2>/dev/null || echo "0")
          echo "changed_count=$count" >> "$GITHUB_OUTPUT"

      - name: Generate Rules
        id: generate
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          CHANGED_RULESETS: ${{ steps.check_upstream.outputs.changed_rulesets }}
        run: python3 scripts/generate_rules.py

      - name: Generate Rule Manifests
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/manifest.py

      - name: Generate Diff Report
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/diff_manifests.py

      - name: Validate Repository Invariants
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_surge_repo.py

      - name: Online Audit (Upstream & Shared Infrastructure)
        if: ${{ fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/audit_rules.py

      - name: Sync DNS Mapping Module
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Module
          curl --fail --location --retry 3 --retry-delay 5 \
            --output Module/DNS-Mapping.sgmodule \
            https://ruleset.skk.moe/Modules/sukka_local_dns_mapping.sgmodule
          sed -i '1s|^#!name=.*|#!name=DNS-Mapping|' Module/DNS-Mapping.sgmodule
          sed -i '2s|^#!desc=.*|#!desc=本地 DNS 映射，优化国内常用服务与局域网域名解析|' Module/DNS-Mapping.sgmodule

      - name: Commit and Push Changes
        if: ${{ (fromJson(steps.check_upstream.outputs.changed_count) > 0 || github.event_name == 'workflow_dispatch') && inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Rule/ Rule/.manifests/ Module/ scripts/manifest.py scripts/diff_manifests.py scripts/diff_report.md scripts/diff_report.json scripts/check_upstream_updates.py scripts/source_state.json

          if ! git diff --staged --quiet; then
            COMMIT_TIME=$(TZ="Asia/Shanghai" date +"%Y-%m-%d %H:%M:%S +0800")
            git commit -m "$COMMIT_TIME Update rules"
            git push
          fi

      - name: Dry Run Summary
        if: ${{ inputs.dry_run == 'true' }}
        shell: bash
        run: |
          echo "::notice::Dry run enabled. Changes were generated and validated, but will NOT be committed."
          git status --short
